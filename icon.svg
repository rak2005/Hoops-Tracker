<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2430"/>
      <stop offset="1" stop-color="#11161d"/>
    </linearGradient>
    <radialGradient id="ball" cx="0.35" cy="0.3" r="0.85">
      <stop offset="0" stop-color="#ff8a3d"/>
      <stop offset="0.6" stop-color="#f1701f"/>
      <stop offset="1" stop-color="#c4540d"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <g transform="translate(256 256)">
    <!-- ball -->
    <circle r="158" fill="url(#ball)"/>
    <!-- seams -->
    <g fill="none" stroke="#11161d" stroke-width="11" stroke-linecap="round">
      <line x1="-158" y1="0" x2="158" y2="0"/>
      <line x1="0" y1="-158" x2="0" y2="158"/>
      <path d="M-112 -112 A 260 260 0 0 1 -112 112"/>
      <path d="M112 -112 A 260 260 0 0 0 112 112"/>
    </g>
    <!-- highlight -->
    <ellipse cx="-58" cy="-62" rx="42" ry="26" fill="#ffffff" opacity="0.18" transform="rotate(-30 -58 -62)"/>
  </g>
</svg>
